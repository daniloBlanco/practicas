    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilosloginp.css">

</head>

<body>

<div class="contenedor" >

        <div id="login" class="panel activo">
            <img id="logo" src="https://img.freepik.com/vector-gratis/vector-degradado-logotipo-colorido-pajaro_343694-1365.jpg?semt=ais_wordcount_boost&w=740&q=80" width="100PX">
            <br>
            <h1>Iniciar Sesión</h1>
            <br>
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" placeholder="Escribe tu usuario aquí" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Escribe tu contraseña aquí" required><br><br>
            <br>

            <p>¿Quieres registrarte?
            <a href="#" onclick="mostrarRegistro()">Regístrate aquí</a>
            </p>
            <br>
            <input type="submit" value="Iniciar Sesión">

        
        </div>


        <div id="registro" class="panel">

                <img ID= logo src="https://img.freepik.com/vector-gratis/vector-degradado-logotipo-colorido-pajaro_343694-1365.jpg?semt=ais_wordcount_boost&w=740&q=80" width="100px">
                <h1>Registro</h1>
                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Escribe tu nombre de usuario aquí" required><br><br>
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" placeholder="Escribe tu nombre aquí" required><br><br>
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Escribe tu correo electrónico aquí" required><br><br>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Escribe tu contraseña aquí" required><br><br>
                <label for="confirm-password">Confirmar Contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña aquí" required><br><br>

                <p>
                <a href="#" onclick="mostrarLogin()">Volver al login</a>
                </p>
                <br>

                <input type="submit" value="Registrarse"> 


        </div>
    
</div>

    <script src="scrips.js"></script>

</body>
</html>
